name: Daily Welfare Briefing

on:
  schedule:
    # 22:00 UTC = 한국시간 오전 7:00 (무료 러너 지연 감안 시 7:00~8:00 사이 발송)
    - cron: '0 22 * * *'
  workflow_dispatch:   # Actions 탭에서 수동 실행 가능

permissions:
  contents: write      # index.html, data.json 커밋용

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 한글 폰트 설치 (카드뉴스용)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: 라이브러리 설치
        run: pip install -q requests beautifulsoup4 lxml pillow

      - name: 봇 실행
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          CHAT_ID_2: ${{ secrets.CHAT_ID_2 }}
          DATA_API_KEY: ${{ secrets.DATA_API_KEY }}
        run: python bot.py

      - name: 웹페이지·스냅샷 커밋
        run: |
          git config user.name "welfare-bot"
          git config user.email "actions@github.com"
          git add index.html data.json
          git diff --staged --quiet || git commit -m "자동 업데이트 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')"
          git push
